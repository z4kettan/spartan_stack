<!-- eslint-disable @angular-eslint/template/elements-content -->
  <header class="flex h-12 shrink-0 items-center gap-2 border-b border-white/20 bg-white/10 backdrop-blur-xl px-4">
    <button hlmSidebarTrigger></button>
    <div class="h-4 w-px bg-border"></div>
    <span class="text-sm font-medium text-foreground">{{ pageTitle }}</span>
    <div class="ml-auto flex items-center gap-2">
      <button
        (click)="theme.toggle()"
        class="inline-flex size-8 items-center justify-center rounded-md hover:bg-accent transition-colors">
        @if (theme.isDark()) {
          <ng-icon name="lucideSun" />
        } @else {
          <ng-icon name="lucideMoon" />
        }
      </button>
      <ng-icon name="lucideBell" />
    </div>
  </header>
